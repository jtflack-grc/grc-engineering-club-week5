name: sign-native-evidence

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  sign-native-evidence:
    name: sign-native-evidence
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Verify evidence file exists
        run: |
          set -euo pipefail
          test -s evidence/security-hub-findings-summary.json
          jq '.captured_finding_count' evidence/security-hub-findings-summary.json

      - name: Hash sanitized Security Hub findings summary
        run: |
          set -euo pipefail
          sha256sum evidence/security-hub-findings-summary.json > evidence/security-hub-findings-summary.json.sha256
          cat evidence/security-hub-findings-summary.json.sha256

      - name: Sign sanitized Security Hub findings summary with Cosign keyless
        run: |
          set -euo pipefail
          cosign sign-blob \
            --yes \
            --bundle evidence/security-hub-findings-summary.sig.bundle \
            evidence/security-hub-findings-summary.json

      - name: Upload signed native AWS evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signed-native-aws-evidence
          path: |
            evidence/security-hub-findings-summary.json
            evidence/security-hub-findings-summary.json.sha256
            evidence/security-hub-findings-summary.sig.bundle
            evidence/cloudtrail-status-summary.json
          if-no-files-found: error
